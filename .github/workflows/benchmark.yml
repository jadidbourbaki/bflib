name: benchmark

on:
  workflow_dispatch: {}

jobs:
  bfhash-bench:
    runs-on: ubuntu-latest

    # contents: write lets the workflow force-push the generated
    # artifacts to the bench-results branch so the README can embed
    # the PNG plots via raw.githubusercontent URLs.
    permissions:
      contents: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install gnuplot
        run: sudo apt-get update && sudo apt-get install -y gnuplot

      - name: Build bench
        run: make -C bench bfhash_bench

      - name: Run bench and write bfhash_results.csv
        run: make -C bench csv

      - name: Generate plots
        run: make -C bench plot

      - name: Show bfhash_results.csv in log
        run: cat bench/bfhash_results.csv

      # Force-push the latest artifacts to the bench-results branch
      # so the README on main can embed the PNGs via raw URLs. The
      # logic lives in a separate shell script for readability and
      # local testability.
      - name: Push artifacts to bench-results branch
        run: .github/scripts/push_bench_results.sh "${{ github.sha }}"
